server {
	#SSL/TLS Configuration
	listen 443 ssl;
	server_name localhost;
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_certificate /etc/nginx/ssl/inception.crt;
	ssl_certificate_key /etc/nginx/ssl/inception.key;

	#root and index and server_name
    root /var/www/wordpress;  # DocumentRoot equivalent in Nginx
    index index.php index.html index.htm;

    # Main directory block equivalent to <Directory /var/www/html/wordpress>
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # WordPress wp-content directory
    location ~* /wp-content/ {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP handling for WordPress (make sure PHP-FPM is installed and running)
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass wordpress:9000;  # Adjust PHP-FPM socket (change version as needed)
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Optional: Custom error and access logs
    access_log /var/log/nginx/wordpress_access.log;
    error_log /var/log/nginx/wordpress_error.log;
}
